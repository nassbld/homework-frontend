server {
    listen 80;

    # Où sont les fichiers du site
    root /usr/share/nginx/html;
    index index.html;

    # Pour toutes les routes (ex: /login, /dashboard), renvoyer index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers le Backend (Optionnel mais recommandé)
    # Ça permet d'appeler "/api/users" au lieu de "http://backend:8080/api/users"
    # et d'éviter les problèmes de CORS.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}